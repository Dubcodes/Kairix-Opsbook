name: Build and publish Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read app version
        id: app-version
        run: |
          VERSION=$(grep -Eo 'app_version: str = os.getenv\("APP_VERSION", "[^"]+"\)' app/kairix/config.py | sed -E 's/.*"([^"]+)"\)$/\1/')
          if [ -z "$VERSION" ]; then
            echo "Could not find app version in app/kairix/config.py" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.app-version.outputs.version }}
            APP_BUILD=${{ github.run_number }}
            APP_BUILD_ITERATION=${{ github.run_attempt }}
            APP_REVISION=${{ github.sha }}
          tags: |
            ghcr.io/dubcodes/kairix-opsbook:latest
            ghcr.io/dubcodes/kairix-opsbook:${{ steps.app-version.outputs.version }}
