services:
  opsbook-stats-agent:
    image: ghcr.io/dubcodes/kairix-opsbook:0.1.17
    container_name: opsbook-stats-agent
    restart: unless-stopped
    network_mode: host
    command: ["python", "-m", "kairix.stats_agent"]
    environment:
      OPSBOOK_URL: "http://127.0.0.1:8095"
      OPSBOOK_AGENT_TOKEN: "replace-with-the-same-token-used-by-opsbook"
      OPSBOOK_DEVICE_ID: ""
      OPSBOOK_DEVICE_NAME: "Moxxie"
      OPSBOOK_DEVICE_HOSTNAME: "moxxie"
      OPSBOOK_PRIMARY_IP: "192.168.0.238"
      OPSBOOK_HOST_ROOT: "/host"
      OPSBOOK_INTERVAL_SECONDS: "60"
    volumes:
      - /:/host:ro
