{% extends "base.html" %}
{% block title %}2FA · Kairix Opsbook{% endblock %}
{% block content %}
<section class="auth-card">
  <p class="eyebrow">Two-factor check</p>
  <h1>Enter your 2FA code</h1>
  <p class="muted">Signing in as {{ pending_username }}.</p>
  <form method="post" class="form-grid">
    <input type="hidden" name="csrf" value="{{ csrf }}">
    <label class="span-2">Authenticator code <input name="code" required inputmode="numeric" autocomplete="one-time-code" autofocus></label>
    <button type="submit">Continue</button>
  </form>
</section>
{% endblock %}
